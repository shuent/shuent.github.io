<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/babc1234cfdc93c2c603.css" as="style"/><link rel="stylesheet" href="/_next/static/css/babc1234cfdc93c2c603.css" data-n-g=""/><noscript data-n-css=""></noscript><link rel="preload" href="/_next/static/chunks/webpack-50bee04d1dc61f8adf5b.js" as="script"/><link rel="preload" href="/_next/static/chunks/framework.e3de07479da4f2477dea.js" as="script"/><link rel="preload" href="/_next/static/chunks/99f422a92ff7083adb8a7d840734144fa7589f68.b95186590b392f2c1cc4.js" as="script"/><link rel="preload" href="/_next/static/chunks/main-65e66ba73b63d0d5d11d.js" as="script"/><link rel="preload" href="/_next/static/chunks/2f47273467f82953ce0d3e7d1c29840c7730737f.1fe69c165e31b7a4cc6d.js" as="script"/><link rel="preload" href="/_next/static/chunks/pages/_app-82b4a82d1e4016e3c02f.js" as="script"/><link rel="preload" href="/_next/static/chunks/pages/blog-8ad92ac573e40244ff2b.js" as="script"/></head><body><div id="__next"><div class="sc-bdvvaa eRQARU"><div><a href="/">Go Top</a></div><h1>blog</h1><ul><li><a href="/blog/ssg-ssr">When to Use Static Generation v.s. Server-side Rendering</a></li><li><a href="/blog/test1">Two Forms of Pre-rendering</a></li></ul></div></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"posts":[{"slug":"ssg-ssr","content":"\nWe recommend using **Static Generation** (with and without data) whenever possible because your page can be built once and served by CDN, which makes it much faster than having a server render the page on every request.\n\nYou can use Static Generation for many types of pages, including:\n\n- Marketing pages\n- Blog posts\n- E-commerce product listings\n- Help and documentation\n\n## code\n\n```js\nalert('hello')\n```\n\n---\n\nYou should ask yourself: \"Can I pre-render this page **ahead** of a user's request?\" If the answer is yes, then you should choose Static Generation.\n\nOn the other hand, Static Generation is **not** a good idea if you cannot pre-render a page ahead of a user's request. Maybe your page shows frequently updated data, and the page content changes on every request.\n\nIn that case, you can use **Server-Side Rendering**. It will be slower, but the pre-rendered page will always be up-to-date. Or you can skip pre-rendering and use client-side JavaScript to populate data.\n","data":{"title":"When to Use Static Generation v.s. Server-side Rendering","date":"2020-01-02"}},{"slug":"test1","content":"\nNext.js has two forms of pre-rendering: **Static Generation** and **Server-side Rendering**. The difference is in **when** it generates the HTML for a page.\n\n- **Static Generation** is the pre-rendering method that generates the HTML at **build time**. The pre-rendered HTML is then _reused_ on each request.\n- **Server-side Rendering** is the pre-rendering method that generates the HTML on **each request**.\n\nImportantly, Next.js lets you **choose** which pre-rendering form to use for each page. You can create a \"hybrid\" Next.js app by using Static Generation for most pages and using Server-side Rendering for others.\n","data":{"title":"Two Forms of Pre-rendering","date":"2020-01-01"}}]},"__N_SSG":true},"page":"/blog","query":{},"buildId":"9uG-xEWIzSYsF1hIW8Ft2","isFallback":false,"gsp":true}</script><script nomodule="" src="/_next/static/chunks/polyfills-79441a336eb07a143a5d.js"></script><script src="/_next/static/chunks/webpack-50bee04d1dc61f8adf5b.js" async=""></script><script src="/_next/static/chunks/framework.e3de07479da4f2477dea.js" async=""></script><script src="/_next/static/chunks/99f422a92ff7083adb8a7d840734144fa7589f68.b95186590b392f2c1cc4.js" async=""></script><script src="/_next/static/chunks/main-65e66ba73b63d0d5d11d.js" async=""></script><script src="/_next/static/chunks/2f47273467f82953ce0d3e7d1c29840c7730737f.1fe69c165e31b7a4cc6d.js" async=""></script><scr
